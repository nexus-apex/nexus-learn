{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Course | NexusLearn{% endblock %}
{% block page_title %}{% if editing %}Edit Course{% else %}New Course{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Instructor</label>
        <input type="text" name="instructor" value="{{ record.instructor|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select name="category">
          <option value="technology" {% if record.category == 'technology' %}selected{% endif %}>Technology</option>
          <option value="business" {% if record.category == 'business' %}selected{% endif %}>Business</option>
          <option value="design" {% if record.category == 'design' %}selected{% endif %}>Design</option>
          <option value="marketing" {% if record.category == 'marketing' %}selected{% endif %}>Marketing</option>
          <option value="hr" {% if record.category == 'hr' %}selected{% endif %}>HR</option>
        </select>
      </div>
      <div class="form-group">
        <label>Duration Hours</label>
        <input type="number" name="duration_hours" value="{{ record.duration_hours|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="published" {% if record.status == 'published' %}selected{% endif %}>Published</option>
          <option value="archived" {% if record.status == 'archived' %}selected{% endif %}>Archived</option>
        </select>
      </div>
      <div class="form-group">
        <label>Enrollments</label>
        <input type="number" name="enrollments" value="{{ record.enrollments|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rating</label>
        <input type="number" step="0.01" name="rating" value="{{ record.rating|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Course</button>
      <a href="/courses/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
