{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Enrollment | NexusLearn{% endblock %}
{% block page_title %}{% if editing %}Edit Enrollment{% else %}New Enrollment{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Student Name</label>
        <input type="text" name="student_name" value="{{ record.student_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Student Email</label>
        <input type="email" name="student_email" value="{{ record.student_email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Course Title</label>
        <input type="text" name="course_title" value="{{ record.course_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Progress</label>
        <input type="number" name="progress" value="{{ record.progress|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Score</label>
        <input type="number" step="0.01" name="score" value="{{ record.score|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="enrolled" {% if record.status == 'enrolled' %}selected{% endif %}>Enrolled</option>
          <option value="in_progress" {% if record.status == 'in_progress' %}selected{% endif %}>In Progress</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="dropped" {% if record.status == 'dropped' %}selected{% endif %}>Dropped</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Enrolled Date</label>
        <input type="date" name="enrolled_date" value="{{ record.enrolled_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Enrollment</button>
      <a href="/enrollments/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
