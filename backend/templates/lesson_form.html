{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Lesson | NexusLearn{% endblock %}
{% block page_title %}{% if editing %}Edit Lesson{% else %}New Lesson{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Course Title</label>
        <input type="text" name="course_title" value="{{ record.course_title|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Lesson Type</label>
        <select name="lesson_type">
          <option value="video" {% if record.lesson_type == 'video' %}selected{% endif %}>Video</option>
          <option value="text" {% if record.lesson_type == 'text' %}selected{% endif %}>Text</option>
          <option value="quiz" {% if record.lesson_type == 'quiz' %}selected{% endif %}>Quiz</option>
          <option value="assignment" {% if record.lesson_type == 'assignment' %}selected{% endif %}>Assignment</option>
        </select>
      </div>
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Position</label>
        <input type="number" name="position" value="{{ record.position|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea name="content">{{ record.content|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Lesson</button>
      <a href="/lessons/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
